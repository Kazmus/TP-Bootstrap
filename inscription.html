    <main>
      <!-- Formulaire -->
      <div class="container mt-5">
        <form>
          <div class="row g-3">
            <h1>Vos Coordonnées</h1>
            <div class="d-flex gap-3">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="myRadio" id="radio1" value="option1">
                  <label class="form-check-label" for="radio1">Homme</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="myRadio" id="radio2" value="option2">
                  <label class="form-check-label" for="radio2">Femme</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="myRadio" id="radio3" value="option3">
                  <label class="form-check-label" for="radio3">Autre</label>
                </div>
            </div>
            <div class="col-lg-4">
              <label for="inputEmail4" class="form-label">Nom <span class="text-danger">*</span></label>
              <input type="name" class="form-control" id="inputSurname4">
            </div>
            <div class="col-lg-4">
              <label for="inputPassword4" class="form-label">Prénom <span class="text-danger">*</span></label>
              <input type="name" class="form-control" id="inputName4">
            </div>
            <div class="col-lg-4">
              <label for="inputPassword4" class="form-label">Téléphone <span class="text-danger">*</span></label>
              <input type="phone" class="form-control" id="inputPhone4">
            </div>
            <div class="col-lg-4">
              <label for="inputEmail4" class="form-label">Email <span class="text-danger">*</span></label>
              <input type="email" class="form-control" id="inputEmail4">
            </div>
            <div class="col-lg-4">
              <label for="inputEmail4" class="form-label">Confirmez votre email <span class="text-danger">*</span></label>
              <input type="email" class="form-control" id="inputConfirmEmail4">
            </div>
            
            <div class="col-lg-4">
              <label for="inputBirthday4" class="form-label">Anniversaire <span class="text-danger">*</span></label>
              <input type="date" class="form-control" id="inputBirthday4">
            </div>
          </div>
          <div class="row g-3 mt-4">
            <h2>Votre adresse</h2>
            <div class="col-lg-4">
              <label for="inputAddress" class="form-label">Rue <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="inputStreet">
            </div>
            <div class="col-lg-2">
              <label for="inputZip" class="form-label">Numéro <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="inputNumber">
            </div>
            <div class="col-lg-2">
              <label for="inputZip" class="form-label">Code postal <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="inputZip">
            </div>
            <div class="col-lg-4">
              <label for="inputCity" class="form-label">Ville <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="inputCity">
            </div>
            
            
            <div class="col-12">
            </div>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-warning">Procéder - Choisir un tarif</button>
          </div>
        </form>  
      </div>
    </main>
