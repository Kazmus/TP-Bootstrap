<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super-Fit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="d-flex flex-column">
    <!-- NAV -->
    <nav class="navbar navbar-expand-lg bg-dark py-3 sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand text-warning" href="index.html">Super-Fit</a>
        <button
          class="navbar-toggler bg-white"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link text-white" href="#">Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#">Tarifs</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#">À propos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- HEADER - HERO -->
    <header class="hero position-relative overflow-hidden">
      <img
        src="images/hero.avif"
        alt=""
        class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover"
      />
      <!-- dark overlay -->
      <div
        class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"
      ></div>
      <!-- CTA -->
      <div
        class="position-absolute top-50 start-50 translate-middle w-100 px-3"
      >
        <h1 class="text-white text-center mb-3">
          Profite de 4 semaines offertes*
        </h1>
        <p class="text-white text-center"><strong>+ UN SAC DE SPORT</strong></p>
        <p class="text-white text-center">
          *Promotion valable du 30/01/26 au 05/03/26 inclus pour une nouvelle
          inscription à un abonnement annuel Comfort, Premium ou Ultimate (durée
          de 4 + 52 semaines).
        </p>
        <div class="d-flex flex-wrap justify-content-center gap-2">
          <button type="button" class="btn btn-primary btn-lg">
            S'INSCRIRE
          </button>
          <button type="button" class="btn btn-light btn-lg">
            VOIR LE PRIX
          </button>
        </div>
      </div>
    </header>
    <main>
      <section class="presentation bg-warning">
        <h2 class="text-center pt-4">Présentation</h2>
        <p></p>
      </section>
    </main>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

</html>
